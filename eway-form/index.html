document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags â manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin â blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec â re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

#F5F9FD; --brand-border:#CFE0F0;\n\n    --ink:#0F172A; --ink-muted:#475569; --ink-faint:#64748B; --ink-ghost:#94A3B8;\n    --line:#E2E8F0; --line-soft:#F1F5F9;\n    --bg:#F7F9FC; --surface:#FFFFFF;\n\n    --red:#DC2626; --red-bg:#FEF2F2;\n    --green:#059669; --green-bg:#ECFDF5;\n    --amber:#D97706; --amber-bg:#FFFBEB;\n\n    --sans:'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;\n    --mono:'IBM Plex Mono', ui-monospace, monospace;\n\n    --shadow-sm: 0 1px 2px rgba(15,23,42,.04), 0 1px 3px rgba(15,23,42,.06);\n    --shadow-md: 0 2px 4px rgba(15,23,42,.04), 0 4px 12px rgba(15,23,42,.06);\n    --shadow-lg: 0 4px 8px rgba(15,23,42,.04), 0 12px 32px rgba(15,23,42,.08);\n    --shadow-brand: 0 8px 24px rgba(0,74,128,.12);\n    --r-sm: 6px; --r-md: 10px; --r-lg: 14px; --r-xl: 18px;\n  }\n  *{box-sizing:border-box}\n  html,body{margin:0;padding:0}\n  body{\n    font-family:var(--sans); color:var(--ink); background:var(--bg);\n    font-feature-settings:\"cv02\",\"cv03\",\"cv04\",\"cv11\";\n    -webkit-font-smoothing:antialiased; min-height:100vh; line-height:1.5;\n  }\n\n  /* top bar */\n  .topbar{background:var(--surface); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:10}\n  .topbar-inner{max-width:1280px; margin:0 auto; padding:14px 32px; display:flex; align-items:center; justify-content:space-between; gap:24px}\n  .brand-row{display:flex; align-items:center; gap:14px}\n  .brand-row img{height:36px; width:auto; display:block}\n  .divider-v{width:1px; height:24px; background:var(--line)}\n  .app-name{font-size:13px; font-weight:600; color:var(--ink-muted)}\n  .topbar-right{display:flex; align-items:center; gap:16px; font-size:13px; color:var(--ink-faint)}\n  .user-pill{display:flex; align-items:center; gap:8px; padding:4px 10px 4px 4px; background:var(--line-soft); border-radius:999px; font-size:13px; color:var(--ink-muted); font-weight:500}\n  .avatar{width:26px; height:26px; border-radius:50%; background:linear-gradient(135deg, var(--brand), var(--brand-light)); color:#fff; font-size:11px; font-weight:600; display:grid; place-items:center}\n\n  /* page head */\n  .page-head{max-width:1280px; margin:0 auto; padding:28px 32px 20px}\n  .breadcrumb{font-size:12px; color:var(--ink-faint); display:flex; align-items:center; gap:6px; margin-bottom:8px}\n  .breadcrumb a{color:var(--ink-faint); text-decoration:none}\n  .breadcrumb a:hover{color:var(--brand)}\n  .breadcrumb .sep{color:var(--ink-ghost)}\n  .page-head h1{font-size:26px; font-weight:700; letter-spacing:-0.01em; color:var(--ink); margin:0}\n  .page-head .sub{font-size:14px; color:var(--ink-muted); margin-top:4px}\n  .page-head-row{display:flex; align-items:flex-end; justify-content:space-between; gap:24px; flex-wrap:wrap}\n  .meta-pills{display:flex; gap:8px; flex-wrap:wrap}\n  .pill{display:inline-flex; align-items:center; gap:6px; padding:5px 10px; font-size:12px; font-weight:500; border-radius:999px; background:var(--brand-pale); color:var(--brand); border:1px solid var(--brand-border)}\n  .pill.muted{background:var(--line-soft); color:var(--ink-muted); border-color:var(--line)}\n  .pill .dot{width:6px; height:6px; border-radius:50%; background:currentColor}\n\n  /* shell */\n  .shell{max-width:1280px; margin:0 auto; padding:0 32px 120px}\n\n  /* stepper â 4 steps */\n  .stepper{display:grid; grid-template-columns:repeat(4,1fr); gap:0; background:var(--surface); border:1px solid var(--line); border-radius:var(--r-lg); padding:8px; box-shadow:var(--shadow-sm); margin-bottom:20px}\n  .step{display:flex; align-items:center; gap:12px; padding:12px 14px; border-radius:var(--r-md); cursor:pointer; position:relative; transition:background .15s; min-width:0}\n  .step:hover{background:var(--brand-soft)}\n  .step + .step::before{content:''; position:absolute; left:-1px; top:50%; height:24px; width:1px; background:var(--line); transform:translateY(-50%)}\n  .step.on{background:var(--brand); color:#fff}\n  .step.on::before, .step.on + .step::before{di -wiz=\"3\">\n        <h2 class=\"step-title\">Parcels &amp; declaration<\u002Fh2>\n        <p class=\"step-sub\">Add a row per parcel. Totals update automatically.<\u002Fp>\n\n        <div class=\"parcel-table\">\n          <div class=\"parcel-thead\">\n            <div>#<\u002Fdiv><div>Description<\u002Fdiv><div>Qty<\u002Fdiv><div>Weight (kg)<\u002Fdiv><div>LÃWÃH (cm)<\u002Fdiv><div>Value ($)<\u002Fdiv><div><\u002Fdiv>\n          <\u002Fdiv>\n          <div id=\"parcel-rows\"><\u002Fdiv>\n          <div id=\"parcel-empty\" class=\"empty\" style=\"display:none;\">No parcels yet â add one to continue.<\u002Fdiv>\n          <div class=\"parcel-footer\">\n            <div class=\"totals\">\n              <span><b id=\"total-count\">0<\u002Fb> parcels<\u002Fspan>\n              <span><b id=\"total-weight\">0.0 kg<\u002Fb> total weight<\u002Fspan>\n              <span><b id=\"total-value\">$0<\u002Fb> declared value<\u002Fspan>\n            <\u002Fdiv>\n            <button class=\"btn\" onclick=\"addParcel()\">\n              <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg>\n              Add parcel\n            <\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"sep\"><\u002Fdiv>\n\n        <div class=\"grid c2\">\n          <div class=\"field\">\n            <label>Contents category <span class=\"req\">*<\u002Fspan><\u002Flabel>\n            <select class=\"select\" id=\"f-contents\">\n              <option>Surgical instruments (sterile)<\u002Foption>\n              <option>Surgical instruments (decontam return)<\u002Foption>\n              <option>Loan set<\u002Foption>\n              <option>Consumables<\u002Foption>\n              <option>Documents / samples<\u002Foption>\n            <\u002Fselect>\n          <\u002Fdiv>\n          <div class=\"field\">\n            <label>Safety declaration <span class=\"req\">*<\u002Fspan><\u002Flabel>\n            <div style=\"display:flex; flex-wrap:wrap; gap:8px;\">\n              <label class=\"check on\" data-toggle=\"\" data-key=\"decl_cleaned\"><span class=\"box\"><\u002Fspan>Cleaned<\u002Flabel>\n              <label class=\"check\" data-toggle=\"\" data-key=\"decl_new\"><span class=\"box\"><\u002Fspan>Brand new<\u002Flabel>\n              <label class=\"check\" data-toggle=\"\" data-key=\"decl_unable\"><span class=\"box\"><\u002Fspan>Unable to clean<\u002Flabel>\n            <\u002Fdiv>\n            <div class=\"hint\">At least one must be ticked. Required by AS/NZS 4187:2014.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- STEP 4: Review -->\n      <section class=\"wizstep\" data-wiz=\"4\">\n        <div id=\"review-view\">\n          <h2 class=\"step-title\">Review &amp; request<\u002Fh2>\n          <p class=\"step-sub\">Submitting sends the pickup task to eWay. The service type is determined server-side.<\u002Fp>\n\n          <div class=\"review-grid\">\n            <div class=\"review-col\">\n              <div class=\"review-block\">\n                <h5>Customer <button class=\"edit-btn\" onclick=\"setWiz(1)\">Edit<\u002Fbutton><\u002Fh5>\n                <div class=\"rcp-row\"><span class=\"k\">Customer<\u002Fspan><span class=\"v\" id=\"r-src\">â<\u002Fspan><\u002Fdiv>\n                <div class=\"rcp-row\"><span class=\"k\">eWayCompanyID<\u002Fspan><span class=\"v\" id=\"r-ew\" style=\"font-family:var(--mono); font-size:11px\">â<\u002Fspan><\u002Fdiv>\n                <div class=\"rcp-row\"><span class=\"k\">client_id<\u002Fspan><span class=\"v\" id=\"r-cid\" style=\"font-family:var(--mono); font-size:11px\">â<\u002Fspan><\u002Fdiv>\n                <div class=\"rcp-row\"><span class=\"k\">Linked eWay job<\u002Fspan><span class=\"v\" id=\"r-ewjob\">â<\u002Fspan><\u002Fdiv>\n                <div class=\"rcp-row\"><span class=\"k\">Date required<\u002Fspan><span class=\"v\" id=\"r-date\">â<\u002Fspan><\u002Fdiv>\n                <div class=\"rcp-row\"><span class=\"k\">Internal ref<\u002Fspan><span class=\"v\" id=\"r-intref\">â<\u002Fspan><\u002Fdiv>\n                <div class=\"rcp-row\"><span class=\"k\">Requested by<\u002Fspan><span class=\"v\" id=\"r-by\">â<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n\n              <div class=\"review-block\">\n                <h5>Route <button class=\"edit-btn\" onclick=\"setWiz(2)\">Edit<\u002Fbutton><\u002Fh5>\n                <div class=\"rcp-row\"><span class=\"k\">From<\u002Fspan><span class=\"v\" id=\"r-from\">â<\u002Fspan><\u002Fdiv>\n                <div class=\"rcp-row\"><span class=\"k\">To<\u002Fspan><span class=\"v\" id=\"r-to\">â<\u002Fspan><\u002Fdiv>\n                <div class=\"rcp-row\"><span class=\"k\">Contact<\u002Fspan><span class=\"v\" id=\"r-contact\">â<\u002Fspan><\u002Fdiv>\n                <div class=\"rcp-row\"><span class=\"k\">Instructions<\u002Fspan><span class=\"v\" id=\"r-inst\">â<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div class=\"review-col\">\n              <div class=\"review-block\">\n                <h5>Parcels <button class=\"edit-btn\" onclick=\"setWiz(3)\">Edit<\u002Fbutton><\u002Fh5>\n                <div id=\"r-parcels\"><\u002Fdiv>\n                <div class=\"rcp-row\"><span class=\"k\">Total parcels<\u002Fspan><span class=\"v\" id=\"r-count\">0<\u002Fspan><\u002Fdiv>\n                <div class=\"rcp-row\"><span class=\"k\">Total weight<\u002Fspan><span class=\"v\" id=\"r-weight\">0 kg<\u002Fspan><\u002Fdiv>\n                <div class=\"rcp-row\"><span class=\"k\">Declared value<\u002Fspan><span class=\"v\" id=\"r-value\">$0<\u002Fspan><\u002Fdiv>\n                <div class=\"rcp-row\"><span class=\"k\">Contents<\u002Fspan><span class=\"v\" id=\"r-contents\">â<\u002Fspan><\u002Fdiv>\n                <div class=\"rcp-row\"><span class=\"k\">Declaration<\u002Fspan><span class=\"v\" id=\"r-decl\">â<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"review-note\">\n            <span class=\"icon\">i<\u002Fspan>\n            <div>Submitting calls <code>POST /api/freight/request<\u002Fcode>. The backend resolves <b>eWayCompanyID<\u002Fb> via <code>customer_eway_mapping<\u002Fcode> and runs the stored procedure that picks the eWay service type. No carrier or price is chosen here.<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"review-block\" id=\"payload-block\" style=\"margin-top:28px\">\n            <h5>Request payload <button class=\"copy\" onclick=\"copyPayload()\" style=\"font-size:11px; background:var(--line-soft); color:var(--ink-muted); border:1px solid var(--line); border-radius:4px; padding:3px 9px; cursor:pointer; font-family:var(--sans); font-weight:500\">Copy JSON<\u002Fbutton><\u002Fh5>\n            <div class=\"payload-card\">\n              <div class=\"payload-head\">\n                <div><span class=\"method\">POST<\u002Fspan><code>/api/freight/request<\u002Fcode><\u002Fdiv>\n                <div style=\"color:#94A3B8; font-size:10px\">application/json Â· Bearer &lt;token&gt;<\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"payload-body\" id=\"payload-body\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Success view -->\n        <div id=\"success-view\" style=\"display:none;\">\n          <div class=\"success\">\n            <div class=\"tick\"><\u002Fdiv>\n            <h2>Freight requested<\u002Fh2>\n            <p>The pickup task was sent to eWay and a freight record was persisted.<\u002Fp>\n            <div>\n              <span class=\"refbox\"><span class=\"lbl\">request_id<\u002Fspan><b id=\"booking-ref\">â<\u002Fb><\u002Fspan>\n              <span class=\"refbox\"><span class=\"lbl\">eWay task ref<\u002Fspan><b id=\"success-ew\">â<\u002Fb><\u002Fspan>\n            <\u002Fdiv>\n\n            <div style=\"max-width:640px; margin:28px auto 0; text-align:left\">\n              <div style=\"font-size:11px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:8px\">API response<\u002Fdiv>\n              <div class=\"payload-card\">\n                <div class=\"payload-head\">\n                  <div><span class=\"method\" style=\"background:#059669\">200<\u002Fspan><code>/api/freight/request<\u002Fcode><\u002Fdiv>\n                  <div style=\"color:#94A3B8; font-size:10px\" id=\"resp-time\">â ms<\u002Fdiv>\n                <\u002Fdiv>\n                <div class=\"payload-body\" id=\"response-body\"><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div class=\"success-actions\">\n              <button class=\"btn\" onclick=\"startOver()\">New request<\u002Fbutton>\n              <button class=\"btn ghost\" onclick=\"toast('Opened eWay task')\">View in eWay<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"formbar\">\n    <div class=\"left\">\n      <span>Step <b id=\"step-n\">1<\u002Fb> of 4<\u002Fspan>\n      <span style=\"color:var(--line)\">Â·<\u002Fspan>\n      <span id=\"save-indicator\"><span class=\"save-dot\"><\u002Fspan>Autosaved<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"right\">\n      <button class=\"btn ghost\" onclick=\"wizNav(-1)\" id=\"back-btn\">\n        <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M19 12H5M12 19l-7-7 7-7\"><\u002Fpath><\u002Fsvg>\n        Back\n      <\u002Fbutton>\n      <button class=\"btn\" onclick=\"saveDraft()\" id=\"draft-btn\">Save draft<\u002Fbutton>\n      <button class=\"btn primary\" onclick=\"wizNav(1)\" id=\"next-btn\">\n        Next\n        <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M12 5l7 7-7 7\"><\u002Fpath><\u002Fsvg>\n      <\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fmain>\n\n<!-- Confirmation dialog -->\n<div class=\"overlay\" id=\"confirm-dlg\">\n  <div class=\"dialog\">\n    <div class=\"dialog-head\">\n      <h3>Request freight?<\u002Fh3>\n      <p>This sends the pickup task to eWay using the details below. The backend stored procedure selects the eWay service type.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"dialog-body\">\n      <div class=\"summary\" id=\"dlg-summary\"><\u002Fdiv>\n      <p class=\"note\">Calls <code>POST /api/freight/request<\u002Fcode>. eWayCompanyID is resolved from <code>customer_eway_mapping<\u002Fcode>.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"dialog-foot\">\n      <button class=\"btn\" onclick=\"closeDialog()\">Cancel<\u002Fbutton>\n      <button class=\"btn primary\" id=\"dlg-confirm\" onclick=\"doSubmit()\">\n        <span id=\"dlg-confirm-label\">Request Freight<\u002Fspan>\n      <\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"toast-area\" id=\"toasts\"><\u002Fdiv>\n\n<!-- Tweaks panel -->\n<aside class=\"tweaks\" id=\"tweaks-panel\">\n  <div class=\"tweaks-head\">\n    <h4>Tweaks<\u002Fh4>\n    <button class=\"close\" onclick=\"closeTweaks()\" aria-label=\"Close tweaks\">Ã<\u002Fbutton>\n  <\u002Fdiv>\n  <div class=\"tweaks-body\">\n    <div class=\"tw-row\">\n      <label for=\"tw-app-name\">App name (top bar)<\u002Flabel>\n      <input type=\"text\" id=\"tw-app-name\">\n    <\u002Fdiv>\n    <div class=\"tw-row\">\n      <label for=\"tw-page-title\">Page title<\u002Flabel>\n      <input type=\"text\" id=\"tw-page-title\">\n    <\u002Fdiv>\n    <div class=\"tw-row\">\n      <label for=\"tw-page-sub\">Page subtitle<\u002Flabel>\n      <input type=\"text\" id=\"tw-page-sub\">\n    <\u002Fdiv>\n    <div class=\"tw-row\">\n      <label for=\"tw-bc-section\">Breadcrumb (section)<\u002Flabel>\n      <input type=\"text\" id=\"tw-bc-section\">\n    <\u002Fdiv>\n    <div class=\"tw-sep\"><\u002Fdiv>\n    <div class=\"tw-row\">\n      <label class=\"tw-check\"><input type=\"checkbox\" id=\"tw-show-breadcrumb\"> Show breadcrumb<\u002Flabel>\n    <\u002Fdiv>\n    <div class=\"tw-row\">\n      <label class=\"tw-check\"><input type=\"checkbox\" id=\"tw-show-draft-pill\"> Show âDraftâ pill<\u002Flabel>\n    <\u002Fdiv>\n    <div class=\"tw-row\">\n      <label class=\"tw-check\"><input type=\"checkbox\" id=\"tw-show-payload\"> Show request payload preview<\u002Flabel>\n      <div class=\"tw-hint\">JSON block on the Review step.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Faside>\n\n<script>\n  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n    \"appName\": \"TIES eWay Form\",\n    \"pageTitle\": \"New freight request\",\n    \"pageSub\": \"Send a pickup task to eWay linked to a customer's job.\",\n    \"bcSection\": \"Freight Requests\",\n    \"showBreadcrumb\": true,\n    \"showDraftPill\": true,\n    \"showPayload\": true\n  }/*EDITMODE-END*/;\n<\u002Fscript>\n\n<script>\n  // ---------- state (mirrors FreightRequestFormData on the backend) ----------\n  const state = {\n    customer: null,              // {client_id, name, code, city, eway_guid|null}\n    linked_eway_job: '2026-04418',\n    requested_by: 'J. Nguyen',\n    internal_reference: '',\n    required_by: null,           // ISO date\n    pickup: null,\n    delivery: null,\n    contact_name: '',\n    contact_phone: '',\n    delivery_instructions: '',\n    parcels: [],\n    contents_category: '',\n    declarations: { decl_cleaned: true, decl_new: false, decl_unable: false },\n  };\n\n  // customer_eway_mapping (backend will serve this)\n  const CUSTOMERS = [\n    { client_id: 'CLI-00421', name: 'Royal Melbourne Hospital',    code: 'RMH',  city: 'Parkville, VIC',   eway_guid: '7f3a9b12-04c8-4e91-b2d5-8c4a6f1e9d0b' },\n    { client_id: 'CLI-00483', name: 'St Vincent\\u2019s Private',   code: 'SVP',  city: 'Fitzroy, VIC',     eway_guid: 'a12d5e44-2b9f-4c77-9d3a-6e0f8b5c2a91' },\n    { client_id: 'CLI-00517', name: 'Epworth Richmond',            code: 'EPW',  city: 'Richmond, VIC',    eway_guid: 'c44e8f21-9a73-4b08-88e6-1f2d9c7b3a54' },\n    { client_id: 'CLI-00604', name: 'Cabrini Malvern',             code: 'CBR',  city: 'Malvern, VIC',     eway_guid: 'd92c1e07-4f6a-4d85-a3b2-7c9e0d4f82a1' },\n    { client_id: 'CLI-00712', name: 'Peter MacCallum Cancer Ctr',  code: 'PMCC', city: 'Parkville, VIC',   eway_guid: 'b73f4a28-6d91-4e5c-9f08-2a1c6b8d5f70' },\n    { client_id: 'CLI-00798', name: 'Warrnambool Base Hospital',   code: 'WBH',  city: 'Warrnambool, VIC', eway_guid: null },\n    { client_id: 'CLI-00841', name: 'Alfred Health',               code: 'ALF',  city: 'Prahran, VIC',     eway_guid: '5e8b2c91-3f47-4a0d-b6e9-0c1d7a4f9852' },\n    { client_id: 'CLI-00902', name: 'Bendigo Health',              code: 'BDH',  city: 'Bendigo, VIC',     eway_guid: '2a6f9d43-8c15-4b92-a7e0-4f3b1c8d6027' },\n    { client_id: 'CLI-00987', name: 'Austin Health',               code: 'AUS',  city: 'Heidelberg, VIC',  eway_guid: '9c4d7e16-5a82-4f3b-b108-6d2e9f0c4a73' },\n    { client_id: 'CLI-01024', name: 'Mildura Base Public',         code: 'MBP',  city: 'Mildura, VIC',     eway_guid: null },\n  ];\n  const EWAY_BASE_URL = 'https://api.eway.example.com/v1';\n\n  // ---------- combobox ----------\n  const combo = document.getElementById('cust-combo');\n  const search = document.getElementById('f-customer-search');\n  const menu = document.getElementById('cust-menu');\n  const card = document.getElementById('cust-card');\n\n  function renderMenu(q = '') {\n    const needle = q.trim().toLowerCase();\n    const rows = CUSTOMERS.filter(c =>\n      !needle || c.name.toLowerCase().includes(needle) ||\n      c.code.toLowerCase().includes(needle) ||\n      c.city.toLowerCase().includes(needle) ||\n      c.client_id.toLowerCase().includes(needle)\n    );\n    menu.innerHTML = '';\n    if (rows.length === 0) {\n      menu.innerHTML = '<div class=\"combo-empty\">No customers match \"' + (q || '') + '\"<\u002Fdiv>';\n      return;\n    }\n    rows.forEach(c => {\n      const el = document.createElement('div');\n      el.className = 'combo-opt';\n      el.setAttribute('role', 'option');\n      el.innerHTML = `\n        <div class=\"co-left\">\n          <div class=\"co-name\">${c.name}<\u002Fdiv>\n          <div class=\"co-sub\">${c.client_id} Â· ${c.code} Â· ${c.city}<\u002Fdiv>\n        <\u002Fdiv>\n        ${c.eway_guid\n          ? `<div class=\"co-guid\">${c.eway_guid.slice(0, 8)}â¦<\u002Fdiv>`\n          : `<div class=\"co-warn\">No eWay map<\u002Fdiv>`}\n      `;\n      el.addEventListener('click', () => selectCustomer(c));\n      menu.appendChild(el);\n    });\n  }\n\n  function selectCustomer(c) {\n    state.customer = c;\n    search.value = c.name;\n    combo.classList.remove('open');\n    card.hidden = false;\n    document.getElementById('cc-name').textContent = c.name;\n    document.getElementById('cc-meta').textContent = `${c.code} Â· ${c.city} Â· ${c.client_id}`;\n    document.getElementById('cc-guid').textContent = c.eway_guid || 'â not mapped â';\n    document.getElementById('cc-cid').textContent = c.client_id;\n    const chip = document.getElementById('cc-chip');\n    if (c.eway_guid) {\n      card.classList.remove('unmapped');\n      chip.className = 'chip chip-map ok';\n      chip.innerHTML = '<svg width=\"11\" height=\"11\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"/><\u002Fsvg> eWay mapped';\n      document.getElementById('cust-hint').innerHTML = 'Source: <code>customer_eway_mapping<\u002Fcode>. Unmapped customers cannot be submitted.';\n    } else {\n      card.classList.add('unmapped');\n      chip.className = 'chip chip-map bad';\n      chip.innerHTML = '<svg width=\"11\" height=\"11\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M18 6L6 18M6 6l12 12\"/><\u002Fsvg> Not mapped';\n      document.getElementById('cust-hint').innerHTML = '<span style=\"color:var(--red); font-weight:600\">Add a row to <code>customer_eway_mapping<\u002Fcode> before submitting.<\u002Fspan>';\n    }\n    toast('Selected ' + c.name, 'ok');\n  }\n\n  search.addEventListener('focus', () => { renderMenu(search.value); combo.classList.add('open'); });\n  search.addEventListener('input', () => { renderMenu(search.value); combo.classList.add('open'); });\n  document.addEventListener('click', (e) => {\n    if (!combo.contains(e.target)) combo.classList.remove('open');\n  });\n  selectCustomer(CUSTOMERS[0]);\n\n  // default required-by date\n  (() => {\n    const pad = n => String(n).padStart(2,'0');\n    const req = new Date(Date.now() + 4*86400000);\n    document.getElementById('f-date').value = `${req.getFullYear()}-${pad(req.getMonth()+1)}-${pad(req.getDate())}`;\n  })();\n\n  // ---------- declaration checkbox toggles ----------\n  document.addEventListener('click', (e) => {\n    const chk = e.target.closest('[data-toggle]');\n    if (!chk) return;\n    chk.classList.toggle('on');\n    if (chk.dataset.key) state.declarations[chk.dataset.key] = chk.classList.contains('on');\n  });\n\n  // ---------- parcels ----------\n  let parcelCounter = 0;\n  function mkRow(data = {}) {\n    parcelCounter++;\n    const id = parcelCounter;\n    const row = document.createElement('div');\n    row.className = 'parcel-row';\n    row.dataset.id = id;\n    row.innerHTML = `\n      <div class=\"idx\">${id}<\u002Fdiv>\n      <input placeholder=\"Description (e.g. tray set)\" data-f=\"desc\" value=\"${data.desc||''}\" />\n      <input type=\"number\" min=\"1\" value=\"${data.qty||1}\" data-f=\"qty\" />\n      <input type=\"number\" step=\"0.1\" placeholder=\"kg\" value=\"${data.weight||''}\" data-f=\"weight\" />\n      <input placeholder=\"LÃWÃH\" value=\"${data.dim||''}\" data-f=\"dim\" />\n      <input placeholder=\"0\" value=\"${data.value||''}\" data-f=\"value\" />\n      <button class=\"x\" title=\"Remove\" aria-label=\"Remove\">\n        <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6\"/><\u002Fsvg>\n      <\u002Fbutton>\n    `;\n    row.querySelector('.x').addEventListener('click', () => { row.remove(); recompute(); renumber(); });\n    row.querySelectorAll('input').forEach(i => i.addEventListener('input', recompute));\n    return row;\n  }\n  function renumber() {\n    document.querySelectorAll('#parcel-rows .parcel-row').forEach((r, i) => {\n      r.querySelector('.idx').textContent = i + 1;\n    });\n  }\n  function addParcel(data = null) {\n    document.getElementById('parcel-rows').appendChild(mkRow(data || {}));\n    recompute();\n    renumber();\n  }\n  function recompute() {\n    const rows = document.querySelectorAll('#parcel-rows .parcel-row');\n    let totalW = 0, totalV = 0;\n    const arr = [];\n    rows.forEach(r => {\n      const desc = r.querySelector('[data-f=\"desc\"]').value;\n      const qty = parseInt(r.querySelector('[data-f=\"qty\"]').value) || 1;\n      const weight = parseFloat(r.querySelector('[data-f=\"weight\"]').value) || 0;\n      const dim = r.querySelector('[data-f=\"dim\"]').value;\n      const value = parseFloat(r.querySelector('[data-f=\"value\"]').value) || 0;\n      totalW += weight * qty;\n      totalV += value * qty;\n      arr.push({ desc, qty, weight, dim, value });\n    });\n    state.parcels = arr;\n    document.getElementById('total-count').textContent = rows.length;\n    document.getElementById('total-weight').textContent = `${totalW.toFixed(1)} kg`;\n    document.getElementById('total-value').textContent = `$${totalV.toLocaleString('en-AU', {maximumFractionDigits:0})}`;\n    document.getElementById('parcel-empty').style.display = rows.length === 0 ? 'block' : 'none';\n  }\n\n  [\n    {desc:'Loan set â orthopaedic', qty:1, weight:'8.2', dim:'60Ã40Ã30', value:'2400'},\n    {desc:'Tray case',              qty:1, weight:'6.1', dim:'50Ã40Ã25', value:'800'},\n  ].forEach(addParcel);\n\n  // ---------- wizard ----------\n  let wizStep = 1;\n  const totalSteps = 4;\n\n  function setWiz(n) {\n    wizStep = Math.max(1, Math.min(totalSteps, n));\n    document.querySelectorAll('.step').forEach(s => {\n      const i = parseInt(s.dataset.step);\n      s.classList.toggle('on', i === wizStep);\n      s.classList.toggle('done', i < wizStep);\n    });\n    document.querySelectorAll('.wizstep').forEach(w => {\n      w.classList.toggle('on', parseInt(w.dataset.wiz) === wizStep);\n    });\n    document.getElementById('step-n').textContent = wizStep;\n    document.getElementById('back-btn').disabled = wizStep === 1;\n    const nb = document.getElementById('next-btn');\n    nb.innerHTML = wizStep === totalSteps\n      ? 'Request Freight <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"1\" y=\"3\" width=\"15\" height=\"13\"/><polygon points=\"16 8 20 8 23 11 23 16 16 16 16 8\"/><circle cx=\"5.5\" cy=\"18.5\" r=\"2.5\"/><circle cx=\"18.5\" cy=\"18.5\" r=\"2.5\"/><\u002Fsvg>'\n      : 'Next <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M12 5l7 7-7 7\"/><\u002Fsvg>';\n    document.getElementById('draft-btn').style.display = wizStep === totalSteps ? 'none' : '';\n    if (wizStep === totalSteps) populateReview();\n    localStorage.setItem('ew_wiz_step_v3', wizStep);\n  }\n\n  function validateStep(n) {\n    clearErrs();\n    const errs = [];\n    if (n === 1) {\n      const dt = document.getElementById('f-date').value;\n      if (!state.customer) { toast('Pick a customer first', 'err'); return false; }\n      if (!state.customer.eway_guid) { toast('Customer is not mapped to an eWay company', 'err'); return false; }\n      if (!dt) errs.push(['f-date', 'Pick a date']);\n    }\n    if (n === 2) {\n      if (!document.getElementById('f-contact').value.trim()) errs.push(['f-contact', 'Contact name is required']);\n      if (!document.getElementById('f-phone').value.trim()) errs.push(['f-phone', 'Phone is required']);\n    }\n    if (n === 3) {\n      if (state.parcels.length === 0) { toast('Add at least one parcel', 'err'); return false; }\n      let bad = false;\n      document.querySelectorAll('#parcel-rows .parcel-row').forEach(r => {\n        const desc = r.querySelector('[data-f=\"desc\"]').value.trim();\n        const w = parseFloat(r.querySelector('[data-f=\"weight\"]').value) || 0;\n        if (!desc || w <= 0) { r.style.background = 'var(--red-bg)'; bad = true; }\n        else { r.style.background = ''; }\n      });\n      if (bad) { toast('Each parcel needs a description and weight', 'err'); return false; }\n      const anyDecl = state.declarations.decl_cleaned || state.declarations.decl_new || state.declarations.decl_unable;\n      if (!anyDecl) { toast('Tick at least one declaration', 'err'); return false; }\n    }\n    if (errs.length) {\n      errs.forEach(([id, msg]) => {\n        const el = document.getElementById(id);\n        el.classList.add('err-b');\n        const f = el.closest('.field');\n        if (f && !f.querySelector('.err')) {\n          const e = document.createElement('div');\n          e.className = 'err'; e.textContent = msg;\n          f.appendChild(e);\n        }\n      });\n      toast(errs[0][1], 'err');\n      return false;\n    }\n    return true;\n  }\n  function clearErrs() {\n    document.querySelectorAll('.err-b').forEach(e => e.classList.remove('err-b'));\n    document.querySelectorAll('.err').forEach(e => e.remove());\n  }\n\n  function wizNav(d) {\n    if (d > 0 && !validateStep(wizStep)) return;\n    if (wizStep === totalSteps && d > 0) { openDialog(); return; }\n    setWiz(wizStep + d);\n    window.scrollTo({ top: 0, behavior: 'smooth' });\n  }\n  document.querySelectorAll('.step').forEach(s =>\n    s.addEventListener('click', () => {\n      const target = parseInt(s.dataset.step);\n      if (target > wizStep) {\n        for (let i = wizStep; i < target; i++) if (!validateStep(i)) return;\n      }\n      setWiz(target);\n    })\n  );\n\n  // ---------- payload builder ----------\n  function activeDeclarations() {\n    return Object.entries(state.declarations).filter(([,v]) => v).map(([k]) => k.replace('decl_', ''));\n  }\n\n  function buildPayload() {\n    const by = document.getElementById('f-by').value || null;\n    const ref = document.getElementById('f-ref').value || null;\n    const ew = document.getElementById('f-ew').value.trim();\n    const dt = document.getElementById('f-date').value || null;\n    return {\n      client_id: state.customer?.client_id ?? null,\n      eway_company_id: state.customer?.eway_guid ?? null,\n      linked_eway_job: ew ? 'EW-' + ew : null,\n      required_by: dt,\n      requested_by: by,\n      internal_reference: ref,\n      pickup: {\n        name: 'TIE Surgical Melbourne',\n        address_line1: '12 Industrial Way',\n        suburb: 'Dandenong South',\n        state: 'VIC',\n        postcode: '3175',\n        country: 'AU',\n      },\n      delivery: {\n        name: state.customer?.name ?? null,\n        address_line1: '(from eWay customer record)',\n        suburb: state.customer?.city?.split(',')[0] ?? null,\n        state: 'VIC',\n        postcode: null,\n        country: 'AU',\n      },\n      contact: {\n        name: document.getElementById('f-contact').value || null,\n        phone: document.getElementById('f-phone').value || null,\n      },\n      delivery_instructions: document.getElementById('f-inst').value || null,\n      parcels: state.parcels.map(p => ({\n        description: p.desc,\n        qty: p.qty,\n        weight_kg: p.weight,\n        dimensions_cm: p.dim,\n        declared_value_aud: p.value,\n      })),\n      contents_category: document.getElementById('f-contents').value || null,\n      declarations: activeDeclarations(),\n    };\n  }\n\n  function syntaxHighlight(obj) {\n    const json = JSON.stringify(obj, null, 2);\n    return json.replace(/&/g, '&amp;').replace(/<\u002Fg, '&lt;').replace(/>/g, '&gt;')\n      .replace(/(\"(?:\\\\.|[^\"\\\\])*\")(\\s*:)?|\\b(true|false|null)\\b|-?\\d+(?:\\.\\d+)?/g, (m, str, colon, bool) => {\n        if (str) return colon ? `<span class=\"jk\">${str}<\u002Fspan>${colon}` : `<span class=\"js\">${str}<\u002Fspan>`;\n        if (bool) return `<span class=\"jb\">${m}<\u002Fspan>`;\n        return `<span class=\"jn\">${m}<\u002Fspan>`;\n      });\n  }\n\n  function copyPayload() {\n    const p = buildPayload();\n    navigator.clipboard?.writeText(JSON.stringify(p, null, 2));\n    toast('Payload copied to clipboard', 'ok');\n  }\n\n  // ---------- review ----------\n  function populateReview() {\n    const dt = document.getElementById('f-date').value;\n    const by = document.getElementById('f-by').value || 'â';\n    const ew = document.getElementById('f-ew').value.trim();\n    const ref = document.getElementById('f-ref').value;\n\n    document.getElementById('r-src').textContent = state.customer ? state.customer.name : 'â';\n    document.getElementById('r-ew').textContent = state.customer?.eway_guid || 'â';\n    document.getElementById('r-cid').textContent = state.customer?.client_id || 'â';\n    document.getElementById('r-ewjob').textContent = ew ? 'EW-' + ew : 'â (none linked)';\n    document.getElementById('r-date').textContent = dt ? new Date(dt).toLocaleDateString('en-AU', {weekday:'long', day:'numeric', month:'long', year:'numeric'}) : 'â';\n    document.getElementById('r-intref').textContent = ref || 'â';\n    document.getElementById('r-by').textContent = by;\n\n    document.getElementById('r-from').textContent = document.getElementById('p-from-name').textContent;\n    document.getElementById('r-to').textContent = document.getElementById('p-to-name').textContent;\n    document.getElementById('r-contact').textContent = `${document.getElementById('f-contact').value} Â· ${document.getElementById('f-phone').value}`;\n    document.getElementById('r-inst').textContent = document.getElementById('f-inst').value || 'â';\n\n    const host = document.getElementById('r-parcels');\n    host.innerHTML = '';\n    let totalW = 0, totalV = 0;\n    state.parcels.forEach((p, i) => {\n      totalW += (p.weight || 0) * (p.qty || 1);\n      totalV += (p.value || 0) * (p.qty || 1);\n      const row = document.createElement('div');\n      row.className = 'rcp-row';\n      const desc = p.desc || `Parcel ${i+1}`;\n      row.innerHTML = `<span class=\"k\">${i+1}. ${desc}<\u002Fspan><span class=\"v\">${p.qty||1}Ã Â· ${(p.weight||0).toFixed(1)} kg<\u002Fspan>`;\n      host.appendChild(row);\n    });\n    document.getElementById('r-count').textContent = state.parcels.length;\n    document.getElementById('r-weight').textContent = `${totalW.toFixed(1)} kg`;\n    document.getElementById('r-value').textContent = `$${totalV.toLocaleString('en-AU', {maximumFractionDigits:0})}`;\n    document.getElementById('r-contents').textContent = document.getElementById('f-contents').value;\n    const decls = activeDeclarations();\n    document.getElementById('r-decl').textContent = decls.length ? decls.map(d => d.charAt(0).toUpperCase() + d.slice(1)).join(', ') : 'â';\n\n    // JSON payload\n    document.getElementById('payload-body').innerHTML = syntaxHighlight(buildPayload());\n  }\n\n  // ---------- confirmation dialog ----------\n  function openDialog() {\n    const p = buildPayload();\n    document.getElementById('dlg-summary').innerHTML = `\n      <div class=\"row\"><span class=\"k\">Customer<\u002Fspan><span class=\"v\">${state.customer.name}<\u002Fspan><\u002Fdiv>\n      <div class=\"row\"><span class=\"k\">eWayCompanyID<\u002Fspan><span class=\"v mono\">${state.customer.eway_guid}<\u002Fspan><\u002Fdiv>\n      <div class=\"row\"><span class=\"k\">Linked eWay job<\u002Fspan><span class=\"v\">${p.linked_eway_job || 'â none â'}<\u002Fspan><\u002Fdiv>\n      <div class=\"row\"><span class=\"k\">Route<\u002Fspan><span class=\"v\">${p.pickup.suburb} â ${p.delivery.suburb || 'â'}<\u002Fspan><\u002Fdiv>\n      <div class=\"row\"><span class=\"k\">Parcels<\u002Fspan><span class=\"v\">${state.parcels.length} items Â· ${state.parcels.reduce((a,b)=>a+(b.weight||0)*(b.qty||1),0).toFixed(1)} kg<\u002Fspan><\u002Fdiv>\n      <div class=\"row\"><span class=\"k\">Required by<\u002Fspan><span class=\"v\">${document.getElementById('f-date').value}<\u002Fspan><\u002Fdiv>`;\n    document.getElementById('confirm-dlg').classList.add('on');\n  }\n  function closeDialog() {\n    document.getElementById('confirm-dlg').classList.remove('on');\n    const lbl = document.getElementById('dlg-confirm-label');\n    const btn = document.getElementById('dlg-confirm');\n    lbl.textContent = 'Request Freight';\n    btn.disabled = false;\n  }\n\n  function doSubmit() {\n    const btn = document.getElementById('dlg-confirm');\n    const lbl = document.getElementById('dlg-confirm-label');\n    btn.disabled = true;\n    lbl.innerHTML = '<span class=\"spinner\"><\u002Fspan> Requestingâ¦';\n    const payload = buildPayload();\n    const t0 = performance.now();\n    setTimeout(() => {\n      const ms = Math.round(performance.now() - t0);\n      const request_id = Math.floor(400000 + Math.random() * 99999);\n      const eway_task_ref = 'EWT-' + String(Math.floor(10000 + Math.random() * 89999));\n      const response = {\n        success: true,\n        data: {\n          request_id,\n          client_id: payload.client_id,\n          eway_company_id: payload.eway_company_id,\n          eway_task_ref,\n          linked_eway_job: payload.linked_eway_job,\n          tracking_number: 'TRK' + Math.floor(1000000 + Math.random() * 8999999),\n          status: 'booked',\n          created_at: new Date().toISOString(),\n        },\n      };\n      document.getElementById('confirm-dlg').classList.remove('on');\n      document.getElementById('review-view').style.display = 'none';\n      document.getElementById('success-view').style.display = 'block';\n      document.getElementById('booking-ref').textContent = String(request_id);\n      document.getElementById('success-ew').textContent = eway_task_ref;\n      document.getElementById('resp-time').textContent = ms + ' ms';\n      document.getElementById('response-body').innerHTML = syntaxHighlight(response);\n      document.getElementById('next-btn').style.display = 'none';\n      document.getElementById('back-btn').style.display = 'none';\n      toast('Booked Â· request #' + request_id, 'ok');\n    }, 800);\n  }\n\n  function startOver() { localStorage.removeItem('ew_wiz_step_v3'); location.reload(); }\n\n  function saveDraft() {\n    const ind = document.getElementById('save-indicator');\n    ind.innerHTML = '<span class=\"save-dot\" style=\"background:var(--amber)\"><\u002Fspan>Savingâ¦';\n    setTimeout(() => {\n      ind.innerHTML = '<span class=\"save-dot\"><\u002Fspan>Autosaved Â· just now';\n      toast('Draft saved', 'ok');\n    }, 400);\n  }\n\n  let saveTimer;\n  document.addEventListener('input', () => {\n    const ind = document.getElementById('save-indicator');\n    ind.innerHTML = '<span class=\"save-dot\" style=\"background:var(--amber)\"><\u002Fspan>Typingâ¦';\n    clearTimeout(saveTimer);\n    saveTimer = setTimeout(() => ind.innerHTML = '<span class=\"save-dot\"><\u002Fspan>Autosaved Â· just now', 700);\n  });\n\n  const saved = parseInt(localStorage.getItem('ew_wiz_step_v3'));\n  if (saved >= 1 && saved <= totalSteps) setWiz(saved);\n  else setWiz(1);\n\n  function toast(msg, kind = '') {\n    const t = document.createElement('div');\n    t.className = 'toast ' + kind;\n    t.innerHTML = `<span class=\"dot\"><\u002Fspan><span>${msg}<\u002Fspan>`;\n    document.getElementById('toasts').appendChild(t);\n    setTimeout(() => { t.style.opacity = 0; t.style.transition = 'opacity .3s'; }, 2400);\n    setTimeout(() => t.remove(), 2800);\n  }\n\n  document.addEventListener('keydown', (e) => {\n    if (e.target.matches('input, textarea, select')) return;\n    if (e.key === 'ArrowRight') wizNav(1);\n    if (e.key === 'ArrowLeft') wizNav(-1);\n    if (e.key === 'Escape') closeDialog();\n  });\n\n  // ---------- Tweaks (edit mode) ----------\n  const tw = { ...TWEAK_DEFAULTS };\n\n  function applyTweak(key, val) {\n    tw[key] = val;\n    if (key === 'appName') {\n      document.getElementById('app-name').textContent = val;\n      document.title = val + ' Â· TIE Surgical';\n    }\n    if (key === 'pageTitle') document.getElementById('page-title').textContent = val;\n    if (key === 'pageSub')   document.getElementById('page-sub').textContent = val;\n    if (key === 'bcSection') document.getElementById('bc-section').textContent = val;\n    if (key === 'showBreadcrumb') document.getElementById('breadcrumb').style.display = val ? '' : 'none';\n    if (key === 'showDraftPill')  document.getElementById('draft-pill').style.display = val ? '' : 'none';\n    if (key === 'showPayload') {\n      const el = document.getElementById('payload-block');\n      if (el) el.style.display = val ? '' : 'none';\n    }\n  }\n\n  function applyAllTweaks(obj) {\n    Object.entries(obj).forEach(([k, v]) => applyTweak(k, v));\n  }\n\n  function hydrateTweakInputs() {\n    document.getElementById('tw-app-name').value        = tw.appName;\n    document.getElementById('tw-page-title').value      = tw.pageTitle;\n    document.getElementById('tw-page-sub').value        = tw.pageSub;\n    document.getElementById('tw-bc-section').value      = tw.bcSection;\n    document.getElementById('tw-show-breadcrumb').checked = !!tw.showBreadcrumb;\n    document.getElementById('tw-show-draft-pill').checked = !!tw.showDraftPill;\n    document.getElementById('tw-show-payload').checked    = !!tw.showPayload;\n  }\n\n  function wireTweakInput(id, key, kind) {\n    const el = document.getElementById(id);\n    const ev = kind === 'bool' ? 'change' : 'input';\n    el.addEventListener(ev, () => {\n      const val = kind === 'bool' ? el.checked : el.value;\n      applyTweak(key, val);\n      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');\n    });\n  }\n\n  function openTweaks()  { document.getElementById('tweaks-panel').classList.add('on'); }\n  function closeTweaks() { document.getElementById('tweaks-panel').classList.remove('on'); }\n\n  // apply defaults immediately (so the page reflects saved values on load)\n  applyAllTweaks(tw);\n\n  // wire inputs (one-time)\n  hydrateTweakInputs();\n  wireTweakInput('tw-app-name',        'appName',        'text');\n  wireTweakInput('tw-page-title',      'pageTitle',      'text');\n  wireTweakInput('tw-page-sub',        'pageSub',        'text');\n  wireTweakInput('tw-bc-section',      'bcSection',      'text');\n  wireTweakInput('tw-show-breadcrumb', 'showBreadcrumb', 'bool');\n  wireTweakInput('tw-show-draft-pill', 'showDraftPill',  'bool');\n  wireTweakInput('tw-show-payload',    'showPayload',    'bool');\n\n  // Register host listener BEFORE announcing availability\n  window.addEventListener('message', (e) => {\n    const d = e.data || {};\n    if (d.type === '__activate_edit_mode')   openTweaks();\n    if (d.type === '__deactivate_edit_mode') closeTweaks();\n  });\n  window.parent.postMessage({ type: '__edit_mode_available' }, '*');\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
